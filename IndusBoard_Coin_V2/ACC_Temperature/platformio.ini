; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s2-kaluga-1]
platform = espressif32
board = esp32-s2-kaluga-1
framework = arduino
monitor_speed = 115200


; Force the USB-S2 native serial port to act as the monitor interface
build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MSC_ON_BOOT=0


; Force PlatformIO to dynamically scan protocols instead of locking a stale port
upload_port = /dev/ttyACM*

; Automatically trigger a soft-reset delay before attempting the flash tool
upload_flags =
    --before=default_reset
    --after=hard_reset